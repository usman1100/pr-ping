# git-cliff configuration for pr-ping
[changelog]
header = "# Changelog\n\nAll notable changes to pr-ping are documented here.\n"
body = """
{% if version %}\
  ## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
  ## [unreleased]
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}\
  ### {{ group | upper_first }}
  {% for commit in commits %}
    - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
      {{ commit.message | upper_first }}\
  {% endfor %}
{% endfor %}\
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = [
  { pattern = "\\(\\w+\\)?!?:", replace = "" },
  { pattern = "feat\\(([^)]+)\\)", replace = "feat($1)" },
]
