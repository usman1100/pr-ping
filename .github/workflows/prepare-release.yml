name: prepare-release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version from conventional commits
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT_VERSION="${LATEST_TAG#v}"

          COMMITS=$(git log "$LATEST_TAG..HEAD" --oneline --no-merges 2>/dev/null || true)

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LATEST_TAG — nothing to release"
            exit 0
          fi

          BREAKING=$(echo "$COMMITS" | grep -cE "(!|BREAKING CHANGE)" || true)
          FEATS=$(echo "$COMMITS" | grep -cE "^(feat|feature)" || true)
          FIXES=$(echo "$COMMITS" | grep -cE "^fix" || true)

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          if [ "$BREAKING" -gt 0 ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$FEATS" -gt 0 ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif [ "$FIXES" -gt 0 ]; then
            PATCH=$((PATCH + 1))
          else
            echo "No feat/fix/breaking commits since $LATEST_TAG — skipping release"
            echo "commits:"
            echo "$COMMITS"
            exit 0
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          echo "Current version: $CURRENT_VERSION"
          echo "Next version:    $NEW_VERSION"
          echo "Breaking: $BREAKING | Feats: $FEATS | Fixes: $FIXES"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: steps.version.outputs.new_version != ''
        run: |
          TAG="v${{ steps.version.outputs.new_version }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping"
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "$TAG"
          git push origin "$TAG"
