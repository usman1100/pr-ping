name: release

on:
  push:
    tags: "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run typecheck

      - run: bun run build:release

      - name: Create or update release
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" &>/dev/null; then
            # Release exists (created by release-please) — just upload assets
            gh release upload "$TAG" \
              dist/pr-ping-v*.tar.gz \
              dist/SHA256SUMS.txt \
              scripts/install.sh \
              --clobber
          else
            # Manual tag — create release and upload
            gh release create "$TAG" \
              dist/pr-ping-v*.tar.gz \
              dist/SHA256SUMS.txt \
              scripts/install.sh \
              --title "$TAG" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
